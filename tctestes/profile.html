<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - Nutrivida</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#d8f3dc,#ffffff);
min-height:100vh;
overflow-x:hidden;
}

/* CONTAINER */

.profile-container{
max-width:900px;
margin:100px auto 40px;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TABS */

.tabs{
display:flex;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

.tabs label{
padding:12px 20px;
background:#eeeeee;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.tabs label:hover{
background:#d8f3dc;
}

input[type="radio"]{
display:none;
}

#tab1:checked ~ .tabs label[for="tab1"],
#tab2:checked ~ .tabs label[for="tab2"],
#tab3:checked ~ .tabs label[for="tab3"]{
background:#2e7d32;
color:white;
}

/* CONTENT */

.content section{
display:none;
animation:fade 0.3s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#tab1:checked ~ .content #profile,
#tab2:checked ~ .content #account,
#tab3:checked ~ .content #advanced{
display:block;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:15px;
}

input[type="text"],
input[type="password"],
textarea{
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
}

textarea{
resize:none;
height:100px;
}

button,
.save{
background:#2e7d32;
color:white;
border:none;
padding:14px;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover,
.save:hover{
background:#256428;
}

/* FOTO */

.avatar{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.avatar img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #2e7d32;
}

#fileInput{
display:none;
}

/* TITULO */

.page-title{
margin-bottom:25px;
color:#1e473d;
}

/* RESPONSIVO */

@media(max-width:700px){

.profile-container{
margin:80px 15px 30px;
padding:20px;
}

.avatar{
flex-direction:column;
text-align:center;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo">
🌱 <span>Nutrivida</span>
</div>

<div class="navbar-actions">

<div class="user-profile-img">

<a href="profile.html">

<img 
id="navbarProfile"
src="https://via.placeholder.com/35" 
alt="Perfil">

</a>

</div>

<div class="menu-icon" id="hamburger">
☰
</div>

</div>

</header>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-top">

<div class="close-btn" id="closeMenu">✖</div>

<a href="profile.html">

<img
id="sidebarProfile"
src="https://ui-avatars.com/api/?name=Nutri+Vida&background=1e473d&color=fff"
alt="User">

</a>

<h3 id="sidebarName">Nutrivida</h3>

<span>Seja bem vindo</span>

</div>

<div class="sidebar-content">

<p class="section-title">GERAL</p>

<ul>

<li><a href="index.html"> Início</a></li>

<li><a href="chatbot.html"> Chatbot</a></li>

<li><a href="profile.html"> Perfil</a></li>

<li><a href="login.html"> Login</a></li>

</ul>

</div>

</div>

<div class="overlay" id="overlay"></div>

<!-- PROFILE -->
<div class="profile-container">

<h1 class="page-title">Meu Perfil</h1>

<input type="radio" name="tab" id="tab1" checked>
<input type="radio" name="tab" id="tab2">
<input type="radio" name="tab" id="tab3">

<!-- TABS -->
<div class="tabs">

<label for="tab1">Profile</label>

<label for="tab2">Account</label>

<label for="tab3">Advanced</label>

</div>

<!-- CONTENT -->
<div class="content">

<!-- PROFILE -->
<section id="profile">

<form id="profileForm">

<div class="avatar">

<img
id="avatarPreview"
src="https://i.imgur.com/6VBx3io.png"
alt="Avatar">

<div>

<input
type="file"
id="fileInput"
accept="image/*">

<button
type="button"
id="selectBtn">

Selecionar Foto

</button>

</div>

</div>

<input
type="text"
id="profileName"
placeholder="Nome">

<textarea
id="profileAbout"
placeholder="Sobre você"></textarea>

<input
class="save"
type="submit"
value="Salvar Perfil">

</form>

</section>

<!-- ACCOUNT -->
<section id="account">

<form>

<input
type="text"
placeholder="Email">

<input
type="text"
placeholder="Usuário">

<input
type="password"
placeholder="Senha">

<input
type="password"
placeholder="Confirmar senha">

<input
class="save"
type="submit"
value="Salvar Conta">

</form>

</section>

<!-- ADVANCED -->
<section id="advanced">

<h2 style="margin-bottom:20px;">
Configurações Avançadas
</h2>

<p>
Mais opções estarão disponíveis em breve.
</p>

</section>

</div>

</div>

<script>

// MENU
const menuBtn = document.getElementById("hamburger");
const sidebar = document.querySelector(".sidebar");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeMenu");

menuBtn.addEventListener("click", () => {

sidebar.classList.add("active");
overlay.classList.add("active");

});

function closeMenu(){

sidebar.classList.remove("active");
overlay.classList.remove("active");

}

overlay.addEventListener("click", closeMenu);

closeBtn.addEventListener("click", closeMenu);

// ELEMENTOS
const form = document.getElementById("profileForm");

const avatarPreview = document.getElementById("avatarPreview");

const fileInput = document.getElementById("fileInput");

const selectBtn = document.getElementById("selectBtn");

const profileName = document.getElementById("profileName");

const profileTitle = document.getElementById("profileTitle");

const profileAbout = document.getElementById("profileAbout");

// ABRIR INPUT FOTO
selectBtn.addEventListener("click", () => {

fileInput.click();

});

// TROCAR FOTO
fileInput.addEventListener("change", () => {

const file = fileInput.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

avatarPreview.src = e.target.result;

localStorage.setItem(
"profilePhoto",
e.target.result
);

document.getElementById("navbarProfile").src = e.target.result;

document.getElementById("sidebarProfile").src = e.target.result;

};

reader.readAsDataURL(file);

}

});

// SALVAR
form.addEventListener("submit", (e) => {

e.preventDefault();

localStorage.setItem(
"profileName",
profileName.value
);

localStorage.setItem(
"profileTitle",
profileTitle.value
);

localStorage.setItem(
"profileAbout",
profileAbout.value
);

alert("Perfil salvo com sucesso!");

document.getElementById("sidebarName").innerText =
profileName.value;

window.location.href = "index.html";

});

// CARREGAR DADOS
window.onload = () => {

profileName.value =
localStorage.getItem("profileName") || "";

profileTitle.value =
localStorage.getItem("profileTitle") || "";

profileAbout.value =
localStorage.getItem("profileAbout") || "";

const savedPhoto =
localStorage.getItem("profilePhoto");

if(savedPhoto){

avatarPreview.src = savedPhoto;

document.getElementById("navbarProfile").src =
savedPhoto;

document.getElementById("sidebarProfile").src =
savedPhoto;

}

const savedName =
localStorage.getItem("profileName");

if(savedName){

document.getElementById("sidebarName").innerText =
savedName;

}

};

function syncUser(){

  const name = localStorage.getItem("profileName") || "Nutrivida";
  const photo = localStorage.getItem("profilePhoto") || "https://ui-avatars.com/api/?name=Nutrivida";

  const sidebarName = document.getElementById("sidebarName");
  const navbarProfile = document.getElementById("navbarProfile");
  const sidebarProfile = document.getElementById("sidebarProfile");

  if(sidebarName) sidebarName.innerText = name;
  if(navbarProfile) navbarProfile.src = photo;
  if(sidebarProfile) sidebarProfile.src = photo;

}

/* carrega ao abrir página */
document.addEventListener("DOMContentLoaded", syncUser);

/* atualiza entre páginas */
window.addEventListener("storage", syncUser);

</script>

</body>
</html>
